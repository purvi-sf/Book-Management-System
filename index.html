<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOOK MANAGEMENT SYSTEM</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background-color: #071A2F;
    }
    h1 {
      color: #1E88FF;
      text-align: center;
    }
   
    label {
      font-weight: bold;
      display: block;
      margin-top: 30px;
      color: #42A5FF;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      background-color: #6495ED;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>BOOK MANAGEMENT SYSTEM</h1>

  <form>
    <label for="title">Title:</label>
    <input type="text" id="title" name="title" placeholder="Enter book title e.g. Matilda">

    <label for="author">Author:</label>
    <input type="text" id="author" name="author" placeholder="Enter author name e.g. Ruskin Bond">

    <label for="isbn">ISBN:</label>
    <input type="text" id="isbn" name="isbn" placeholder="e.g. 978-0-19-853453-1">

    <label for="pub_date">Publication Date:</label>
    <input type="date" id="pub_date" name="pub_date">

    <label for="genre">Genre:</label>
    <input type="text" id="genre" name="genre" placeholder="e.g. Romance, Horror, etc">

    <button type="submit">Add Book!</button>
  </form>

</body>
</html>
