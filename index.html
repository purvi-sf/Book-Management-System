<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Management System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Book Management System</h1>

  <div class="form-section">

    <h2 id="formHeading">Add a New Book</h2>

    <label for="title">Title:</label>
    <input type="text" id="title" placeholder="Enter book title">
    <span class="error" id="titleError">Title is required.</span>

    <label for="author">Author:</label>
    <input type="text" id="author" placeholder="Enter author name">
    <span class="error" id="authorError">Author is required.</span>

    <label for="isbn">ISBN:</label>
    <input type="text" id="isbn" placeholder="Enter ISBN number">
    <span class="error" id="isbnError">ISBN must be a valid number.</span>

    <label for="publish_date">Publication Date:</label>
    <input type="date" id="publish_date">
    <span class="error" id="publish_dateError">Publication date is required.</span>

    <label for="genre">Genre:</label>
    <input type="text" id="genre" placeholder="e.g. Fiction, Fantasy, History">
    <span class="error" id="genreError">Genre is required.</span>

    <br><br>

    <button id="submitBtn" onclick="submit_book()">Add Book</button>
    <button id="cancelBtn" onclick="cancelEdit()">Cancel</button>

    <p class="success" id="successMsg">Book added successfully!</p>

  </div>

  <hr>
  <div class="list-section">
    <h2>Book List</h2>
    <p id="noBooks">No books added yet.</p>

    <table id="bookTable">
      <thead>
        <tr>
          <th>Srl No.</th>
          <th>Title</th>
          <th>Author</th>
          <th>ISBN</th>
          <th>Publication Date</th>
          <th>Age (years)</th>
          <th>Genre</th>
          <th>Era</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="bookTableBody">
      </tbody>
    </table>

  </div>
  <script src="script.js"></script>
</body>
</html>
